    <!--
      Security: the whole point of this tool is to run JSX you write, so the
      preview iframe needs inline + blob: + data: module scripts. That surface is
      confined to the sandboxed preview iframe; the app shell itself makes no
      eval calls. 'wasm-unsafe-eval' is for the esbuild WebAssembly compiler.
      esm.sh is only contacted when you opt in to fetching an extra library.
    -->
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self' 'wasm-unsafe-eval' 'unsafe-inline' blob: data: https://esm.sh https://static.cloudflareinsights.com; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self' data:; connect-src 'self' blob: data: https://esm.sh https://cloudflareinsights.com https://feedback.benrichardson.dev; worker-src 'self' blob:; child-src 'self' blob: data:; frame-src 'self' blob: data:; object-src 'none'; base-uri 'self'; form-action 'none';"
    />

    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <title>Reactwell — instant in-browser JSX / TSX preview</title>

    <script type="application/ld+json">

        "@context": "https://schema.org",

        "url": "https://reactwell.benrichardson.dev/",
        "image": "https://reactwell.benrichardson.dev/og.png",
        "applicationCategory": "DeveloperApplication",

        "offers": { "@type": "Offer", "price": "0", "priceCurrency": "USD" }
      }
    </script>
    <script defer src="https://static.cloudflareinsights.com/beacon.min.js" data-cf-beacon='{"token": "ba2bab2193ba42c1bea3d6714fcd0e28"}'></script>
  </head>
